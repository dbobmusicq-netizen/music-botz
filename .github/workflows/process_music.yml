name: TBL Ultra Music Engine (Unblockable v6.0)
on:
  repository_dispatch:
    types: [process_music]

jobs:
  turbo-process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⚡ High-Speed Execution
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          U_ID: "${{ github.event.client_payload.chat_id }}"
          M_ID: "${{ github.event.client_payload.msg_id }}"
          T_ID: "${{ github.event.client_payload.track_id }}"
          QUERY: "${{ github.event.client_payload.query }}"
          WEBAPP_URL: "https://prod-api.telebothost.com/ownlang/webapp/15614049/save_cache"
        run: |
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          chmod a+rx /usr/local/bin/yt-dlp

          python3 - <<EOF
          import os, requests, subprocess, json, sys

          def run():
              q = os.environ['QUERY']
              # We clean the query only for YouTube search to be more specific
              clean_q = "".join(e for e in q if e.isalnum() or e.isspace())
              
              # THE ULTIMATE BYPASS LIST
              # We try 6 different clients and 2 platforms (YT + SC)
              sources = [
                  # 1. YouTube Android VR Client (Currently the strongest bypass)
                  ['yt-dlp', f"ytsearch1:{q}", '--extract-audio', '--audio-format', 'mp3', '--force-ipv4', '--extractor-args', 'youtube:player_client=android_vr,ios', '-o', 't.mp3', '--no-playlist', '--quiet', '--write-info-json'],
                  # 2. SoundCloud Primary (100% working on GitHub IPs)
                  ['yt-dlp', f"scsearch1:{q}", '--extract-audio', '--audio-format', 'mp3', '-o', 't.mp3', '--quiet', '--write-info-json'],
                  # 3. YouTube TV Client Fallback
                  ['yt-dlp', f"ytsearch1:{clean_q}", '--extract-audio', '--audio-format', 'mp3', '--force-ipv4', '--extractor-args', 'youtube:player_client=tv,web', '-o', 't.mp3', '--no-playlist', '--quiet', '--write-info-json'],
                  # 4. YouTube Mobile Web Fallback
                  ['yt-dlp', f"ytsearch1:{clean_q}", '--extract-audio', '--audio-format', 'mp3', '--force-ipv4', '--extractor-args', 'youtube:player_client=mweb,android', '-o', 't.mp3', '--no-playlist', '--quiet', '--write-info-json']
              ]

              success = False
              for cmd in sources:
                  print(f"Trying source: {cmd[1]}")
                  try:
                      # Increased timeout to allow for slow YouTube challenges
                      subprocess.run(cmd, check=True, timeout=180)
                      if os.path.exists('t.mp3'):
                          success = True
                          break
                  except:
                      continue

              if not success:
                  requests.post(f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendMessage", 
                               data={'chat_id': os.environ['U_ID'], 'text': "❌ *System Alert:* High-level protection detected. Trying emergency bypass...", 'parse_mode': 'Markdown'})
                  # FINAL EMERGENCY ATTEMPT: Raw Search without formats
                  try:
                      subprocess.run(['yt-dlp', f"ytsearch1:{q}", '-x', '--audio-format', 'mp3', '--no-check-certificates', '-o', 't.mp3', '--quiet', '--write-info-json'], check=True)
                      if os.path.exists('t.mp3'): success = True
                  except: pass

              if not success:
                  requests.post(f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendMessage", 
                               data={'chat_id': os.environ['U_ID'], 'text': "❌ *Failed:* YouTube is strictly blocking datacenter IPs. Please try again in a few minutes.", 'parse_mode': 'Markdown'})
                  return

              # --- SUCCESS: DELIVER AND CACHE ---
              info_files = [f for f in os.listdir('.') if f.endswith('.info.json')]
              with open(info_files[0], 'r') as f:
                  meta = json.load(f)
              title = meta.get('title', 'Audio')[:100]

              url = f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendAudio"
              with open('t.mp3', 'rb') as audio_file:
                  r = requests.post(url, data={
                      'chat_id': os.environ['U_ID'], 
                      'title': title, 
                      'caption': f"✅ *Successfully Bypassed!*\n🎵 {title}", 
                      'parse_mode': 'Markdown'
                  }, files={'audio': audio_file})

              # Cache Update (Ensures T_ID exists)
              if r.json().get('ok'):
                  fid = r.json()['result']['audio']['file_id']
                  tid = os.environ.get('T_ID')
                  if tid and tid != "undefined":
                      requests.get(os.environ['WEBAPP_URL'], params={'id': tid, 'file': fid}, headers={"User-Agent":"Mozilla/5.0"})

              # Cleanup
              requests.post(f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/deleteMessage", 
                            data={'chat_id': os.environ['U_ID'], 'message_id': os.environ['M_ID']})

          run()
          EOF
