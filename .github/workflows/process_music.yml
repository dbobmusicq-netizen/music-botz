name: TBL Ultra Music Engine (Direct Delivery + Caching)
on:
  repository_dispatch:
    types: [process_music]

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🛠 Setup Environment (FFmpeg)
        uses: federicocarboni/setup-ffmpeg@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Install yt-dlp & Requests
        run: python3 -m pip install -U yt-dlp requests

      - name: 📥 Advanced Extraction
        id: dl
        env:
          QUERY: "${{ github.event.client_payload.query }}"
        run: |
          CLEAN_QUERY=$(echo "$QUERY" | sed 's/[^a-zA-Z0-9 ]/ /g' | xargs)
          
          yt-dlp "ytsearch1:$CLEAN_QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --force-ipv4 --extractor-args "youtube:player_client=android_vr,ios" \
            --no-playlist --no-check-certificates --no-warnings \
            -o "track.mp3" --write-info-json || \
          yt-dlp "scsearch1:$QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --no-playlist -o "track.mp3" --write-info-json

          if [ ! -f "track.mp3" ]; then echo "All sources failed" && exit 1; fi

      - name: ☁️ Direct Delivery & Smart Cache Update
        id: tg_pro
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          DUMP_CHAT_ID: ${{ secrets.TG_DUMP_CHAT_ID }}
          USER_CHAT_ID: "${{ github.event.client_payload.chat_id }}"
          MSG_ID: "${{ github.event.client_payload.msg_id }}"
          TRACK_ID: "${{ github.event.client_payload.track_id }}"
          # Replace 'YOUR_BOT_ID' with your numeric bot ID from TBL URL
          WEBAPP_URL: "https://prod-api.telebothost.com/ownlang/webapp/YOUR_BOT_ID/save_cache"
        run: |
          python3 - <<EOF
          import os, requests, json, sys

          bot_token = os.environ['BOT_TOKEN']
          user_id = os.environ['USER_CHAT_ID']
          dump_id = os.environ['DUMP_CHAT_ID']
          msg_id = os.environ['MSG_ID']
          track_id = os.environ['TRACK_ID']
          webapp_base = os.environ['WEBAPP_URL']

          # 1. GET METADATA
          json_files = [f for f in os.listdir('.') if f.endswith('.info.json')]
          with open(json_files[0], 'r') as f:
              data = json.load(f)

          title = data.get('title', 'Unknown Title')[:100]
          duration = data.get('duration_string', '0:00')

          # 2. UPLOAD DIRECTLY TO THE USER
          print(f"Delivering song to User: {user_id}...")
          files = {'audio': open('track.mp3', 'rb')}
          payload = {
              'chat_id': user_id, 
              'title': title, 
              'performer': 'Ultra Music Engine',
              'caption': f"✅ *Track Found!*\n🎵 *{title}*\n⏱ {duration}",
              'parse_mode': 'Markdown'
          }
          
          url_tg = f"https://api.telegram.org/bot{bot_token}/sendAudio"
          requests.post(url_tg, data=payload, files=files)

          # 3. UPLOAD TO STORAGE CHANNEL TO GET PERMANENT FILE_ID
          print("Saving to Storage Channel for caching...")
          files_dump = {'audio': open('track.mp3', 'rb')}
          r_dump = requests.post(url_tg, data={'chat_id': dump_id, 'title': title}, files=files_dump)
          
          if r_dump.json().get('ok'):
              perm_file_id = r_dump.json()['result']['audio']['file_id']
              
              # 4. UPDATE BOT CACHE (Bypassing Cloudflare via Webapp GET)
              print(f"Updating Bot Cache for Track ID: {track_id}")
              cache_params = {'id': track_id, 'file': perm_file_id}
              headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/124.0.0.0"}
              requests.get(webapp_base, params=cache_params, headers=headers)
          
          # 5. DELETE THE LOADING MESSAGE
          requests.post(f"https://api.telegram.org/bot{bot_token}/deleteMessage", data={'chat_id': user_id, 'message_id': msg_id})
          EOF
