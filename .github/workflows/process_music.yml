name: TBL Hybrid Turbo Engine (v9.1 - Ironclad + Lyrics)
on:
  repository_dispatch:
    types: [process_music]

jobs:
  hybrid-delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🛠 Setup FFmpeg
        uses: federicocarboni/setup-ffmpeg@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Install Dependencies
        run: |
          python3 -m pip install -U yt-dlp requests
          echo "/usr/bin" >> $GITHUB_PATH

      - name: 📥 Ironclad Waterfall Extraction
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          DUMP_ID: ${{ secrets.TG_DUMP_CHAT_ID }}
          U_ID: "${{ github.event.client_payload.chat_id }}"
          M_ID: "${{ github.event.client_payload.msg_id }}"
          T_ID: "${{ github.event.client_payload.track_id }}"
          QUERY: "${{ github.event.client_payload.query }}"
          WEB_URL: "https://prod-api.telebothost.com/ownlang/webapp/15614049/save_cache"
        run: |
          python3 - <<EOF
          import os, requests, subprocess, json, sys, time

          def ironclad_engine():
              query = os.environ['QUERY']
              bot_token = os.environ['BOT_TOKEN']
              user_id = os.environ['U_ID']
              dump_id = os.environ['DUMP_ID']
              track_id = os.environ.get('T_ID', '0')
              
              success = False
              final_title = "Audio"

              # --- LAYER 1: JIOSAAVN ---
              try:
                  print(f"Layer 1: Searching JioSaavn for {query}")
                  api = f"https://saavn.me/search/songs?query={query}&limit=1"
                  r = requests.get(api, timeout=10).json()
                  if r['status'] == 'SUCCESS' and r['data']['results']:
                      res = r['data']['results'][0]
                      final_title = f"{res['name']} - {res['primaryArtists']}"
                      audio_url = res['downloadUrl'][4]['link']
                      
                      with requests.get(audio_url, stream=True) as r_file:
                          with open('track.mp3', 'wb') as f:
                              for chunk in r_file.iter_content(chunk_size=8192):
                                  f.write(chunk)
                      if os.path.exists('track.mp3'): success = True
              except Exception as e:
                  print(f"Saavn Layer failed: {e}")

              # --- LAYER 2: YOUTUBE MUSIC ---
              if not success:
                  print("Layer 2: Trying YouTube Music...")
                  ydl_opts = {
                      'format': 'bestaudio/best',
                      'outtmpl': 'track.%(ext)s',
                      'postprocessors': [{'key': 'FFmpegExtractAudio','preferredcodec': 'mp3','preferredquality': '192'}],
                      'quiet': True,
                      'no_warnings': True,
                      'force_ipv4': True,
                      'extractor_args': {'youtube': {'player_client': ['android_vr', 'ios']}}
                  }
                  try:
                      import yt_dlp
                      with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                          info = ydl.extract_info(f"ytsearch1:{query}", download=True)
                          final_title = info['entries'][0]['title']
                          success = True
                  except Exception as e:
                      print(f"YouTube Layer failed: {e}")

              # --- LAYER 3: SOUNDCLOUD ---
              if not success:
                  print("Layer 3: Trying SoundCloud...")
                  try:
                      subprocess.run(['yt-dlp', f"scsearch1:{query}", '--extract-audio', '--audio-format', 'mp3', '-o', 'track.mp3', '--quiet'], check=True)
                      if os.path.exists('track.mp3'): success = True
                  except: pass

              # --- DELIVERY SECTION (LYRIC ENABLED) ---
              if success and os.path.exists('track.mp3'):
                  print(f"Success! Delivering: {final_title}")
                  tg_url = f"https://api.telegram.org/bot{bot_token}/sendAudio"
                  
                  # Create the Lyrics Button
                  lyric_kb = json.dumps({
                      "inline_keyboard": [[{"text": "📝 View Lyrics", "callback_data": f"lyr_{track_id}"}]]
                  })

                  with open('track.mp3', 'rb') as audio_file:
                      # 1. Upload to storage channel
                      r_dump = requests.post(tg_url, data={'chat_id': dump_id, 'title': final_title}, files={'audio': audio_file})
                  
                  if r_dump.json().get('ok'):
                      fid = r_dump.json()['result']['audio']['file_id']
                      
                      # 2. Forward to user with LYRIC BUTTON
                      requests.post(tg_url, data={
                          'chat_id': user_id, 
                          'audio': fid, 
                          'caption': f"✅ *Successfully Found!*\n🎵 {final_title}", 
                          'parse_mode': 'Markdown',
                          'reply_markup': lyric_kb
                      })
                      
                      # 3. Cache Sync (GET bypasses Cloudflare)
                      if track_id != "undefined" and track_id != "0":
                          requests.get(os.environ['WEB_URL'], params={'id': track_id, 'file': fid}, headers={"User-Agent":"Mozilla/5.0"})
              else:
                  requests.post(f"https://api.telegram.org/bot{bot_token}/sendMessage", data={'chat_id': user_id, 'text': "❌ *Stable Error:* Track unavailable on all sources."})

              # Cleanup UI
              requests.post(f"https://api.telegram.org/bot{bot_token}/deleteMessage", data={'chat_id': user_id, 'message_id': os.environ['M_ID']})

          ironclad_engine()
          EOF
