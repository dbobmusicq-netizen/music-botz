name: TBL Ultra Music Engine
on:
  repository_dispatch:
    types: [process_music]

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🛠 Setup Environment (FFmpeg)
        uses: federicocarboni/setup-ffmpeg@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Install yt-dlp
        run: python3 -m pip install -U yt-dlp

      - name: 📥 Advanced Extraction (Triple Bypass)
        id: dl
        env:
          QUERY: "${{ github.event.client_payload.query }}"
        run: |
          # Clean Query but keep it descriptive
          CLEAN_QUERY=$(echo "$QUERY" | sed 's/[^a-zA-Z0-9 ]/ /g' | xargs)
          
          # Try YouTube (Android VR Client) then SoundCloud
          yt-dlp "ytsearch1:$CLEAN_QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --force-ipv4 --extractor-args "youtube:player_client=android_vr,ios" \
            --no-playlist --no-check-certificates --no-warnings \
            -o "track.mp3" --write-info-json || \
          yt-dlp "scsearch1:$QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --no-playlist -o "track.mp3" --write-info-json

          if [ ! -f "track.mp3" ]; then echo "All sources failed" && exit 1; fi

      - name: ☁️ Pro-Shield Telegram Upload (Python)
        id: tg_upload
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TG_DUMP_CHAT_ID }}
        run: |
          python3 - <<EOF
          import os, requests, json, sys

          # Get metadata from the info.json file
          json_files = [f for f in os.listdir('.') if f.endswith('.info.json')]
          with open(json_files[0], 'r') as f:
              data = json.load(f)

          title = data.get('title', 'Unknown Title')[:100]
          performer = (data.get('uploader') or data.get('artist') or 'Music Bot')[:50]
          duration = data.get('duration_string', '0:00')
          vid_id = data.get('id', '0')
          thumb = data.get('thumbnail', '')

          # Upload to Telegram
          files = {'audio': open('track.mp3', 'rb')}
          payload = {
              'chat_id': os.environ['CHAT_ID'],
              'title': title,
              'performer': performer
          }
          
          url = f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendAudio"
          r = requests.post(url, data=payload, files=files)
          res = r.json()

          if not res.get('ok'):
              print(f"Telegram Error: {res}")
              sys.exit(1)

          # Pass values to GitHub Env
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"FILE_ID={res['result']['audio']['file_id']}\n")
              f.write(f"TITLE={title}\n")
              f.write(f"DUR={duration}\n")
              f.write(f"THUMB={thumb}\n")
              f.write(f"VID_ID={vid_id}\n")
          EOF

      - name: 📡 Success Callback (Cloudflare Stealth)
        if: success()
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36" \
            -d "{
              \"status\": \"success\",
              \"chat_id\": \"${{ github.event.client_payload.chat_id }}\",
              \"mid\": \"${{ github.event.client_payload.msg_id }}\",
              \"video_id\": \"${{ env.VID_ID }}\",
              \"file_id\": \"${{ env.FILE_ID }}\",
              \"title\": \"${{ env.TITLE }}\",
              \"duration\": \"${{ env.DUR }}\",
              \"thumbnail\": \"${{ env.THUMB }}\"
            }"
