name: TBL Zenith Music Engine (v13.0 - Maximum Stability)
on:
  repository_dispatch:
    types: [process_music]

jobs:
  zenith-delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🛠 Setup Pro Environment
        uses: federicocarboni/setup-ffmpeg@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Install Advanced Dependencies
        run: |
          python3 -m pip install -U yt-dlp requests
          echo "/usr/bin" >> $GITHUB_PATH

      - name: 📥 Zenith Waterfall Extraction
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          DUMP_ID: ${{ secrets.TG_DUMP_CHAT_ID }}
          U_ID: "${{ github.event.client_payload.chat_id }}"
          M_ID: "${{ github.event.client_payload.msg_id }}"
          T_ID: "${{ github.event.client_payload.track_id }}"
          QUERY: "${{ github.event.client_payload.query }}"
          WEB_URL: "https://prod-api.telebothost.com/ownlang/webapp/15614049/save_cache"
        run: |
          python3 - <<EOF
          import os, requests, subprocess, json, sys, time

          def zenith_engine():
              query = os.environ['QUERY']
              bot_token = os.environ['BOT_TOKEN']
              user_id = os.environ['U_ID']
              dump_id = os.environ['DUMP_ID']
              track_id = os.environ.get('T_ID', '0')
              
              success = False
              final_title = query
              
              # Unified Session for all requests to maintain cookies/headers
              session = requests.Session()
              session.headers.update({
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
                  "Accept-Language": "en-US,en;q=0.9"
              })

              # --- LAYER 1: JIOSAAVN (STABLE INTERNAL API) ---
              try:
                  print(f"Layer 1: JioSaavn Internal Search -> {query}")
                  search_url = f"https://www.jiosaavn.com/api.php?__call=autocomplete.get&_format=json&_marker=0&cc=in&includeMetaTags=1&query={query}"
                  s_res = session.get(search_url, timeout=10).json()
                  
                  if s_res.get('songs') and s_res['songs']['data']:
                      song = s_res['songs']['data'][0]
                      final_title = f"{song['title']} - {song['description']}"
                      # Use the public high-speed API to get the verified 320kbps link
                      # We use this as a fallback for the internal download
                      dl_api = f"https://saavn.me/search/songs?query={query}&limit=1"
                      dl_res = requests.get(dl_api, timeout=10).json()
                      
                      if dl_res['status'] == 'SUCCESS':
                          audio_url = dl_res['data']['results'][0]['downloadUrl'][4]['link']
                          print(f"Found Saavn Link. Downloading...")
                          with session.get(audio_url, stream=True, timeout=30) as r:
                              with open('track.mp3', 'wb') as f:
                                  for chunk in r.iter_content(chunk_size=32768): f.write(chunk)
                          
                          if os.path.exists('track.mp3') and os.path.getsize('track.mp3') > 100000:
                              success = True
                              print("✅ JioSaavn Success!")
              except Exception as e:
                  print(f"Saavn Layer failed: {e}")

              # --- LAYER 2: YOUTUBE MUSIC (PRO STEALTH BYPASS) ---
              if not success:
                  print("Layer 2: YouTube Stealth Mode...")
                  # We rotate through 3 specifically chosen clients that bypass data center bans
                  yt_clients = ['tv', 'android', 'web_embedded']
                  for client in yt_clients:
                      if success: break
                      print(f"Trying YT Client: {client}")
                      ydl_opts = {
                          'format': 'bestaudio/best',
                          'outtmpl': 'track.%(ext)s',
                          'postprocessors': [{'key': 'FFmpegExtractAudio','preferredcodec': 'mp3','preferredquality': '192'}],
                          'quiet': True,
                          'no_warnings': True,
                          'force_ipv4': True,
                          'extractor_args': {'youtube': {'player_client': [client]}},
                          # Trick: Simulate request coming from a real Google search result
                          'referer': 'https://www.google.com/search?q=youtube+' + query.replace(' ', '+')
                      }
                      try:
                          import yt_dlp
                          with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                              info = ydl.extract_info(f"ytsearch1:{query}", download=True)
                              final_title = info['entries'][0]['title']
                              if os.path.exists('track.mp3') and os.path.getsize('track.mp3') > 50000:
                                  success = True
                                  print(f"✅ YouTube Success ({client})!")
                      except:
                          if os.path.exists('track.mp3'): os.remove('track.mp3')

              # --- LAYER 3: SOUNDCLOUD (THE IRONCLAD FALLBACK) ---
              if not success:
                  print("Layer 3: SoundCloud Emergency Fallback...")
                  try:
                      subprocess.run(['yt-dlp', f"scsearch1:{query}", '--extract-audio', '--audio-format', 'mp3', '-o', 'track.mp3', '--quiet'], check=True)
                      if os.path.exists('track.mp3'): 
                          success = True
                          print("✅ SoundCloud Success!")
                  except: pass

              # --- FINAL DELIVERY ---
              if success and os.path.exists('track.mp3'):
                  tg_url = f"https://api.telegram.org/bot{bot_token}/sendAudio"
                  lyric_kb = json.dumps({"inline_keyboard": [[{"text": "📝 View Lyrics", "callback_data": f"lyr_{track_id}"}]]})

                  with open('track.mp3', 'rb') as audio_file:
                      r_dump = requests.post(tg_url, data={'chat_id': dump_id, 'title': final_title}, files={'audio': audio_file})
                  
                  if r_dump.json().get('ok'):
                      fid = r_dump.json()['result']['audio']['file_id']
                      requests.post(tg_url, data={
                          'chat_id': user_id, 
                          'audio': fid, 
                          'caption': f"✅ *Successfully Found!*\n🎵 {final_title}\n⚡ _Zenith Hybrid Engine (v13)_", 
                          'parse_mode': 'Markdown', 
                          'reply_markup': lyric_kb
                      })
                      
                      if track_id != "undefined" and track_id != "0":
                          requests.get(os.environ['WEB_URL'], params={'id': track_id, 'file': fid}, headers={"User-Agent":"Mozilla/5.0"})
              else:
                  requests.post(f"https://api.telegram.org/bot{bot_token}/sendMessage", data={'chat_id': user_id, 'text': "❌ *Stable Error:* This track is globally restricted. Try a different version."})

              requests.post(f"https://api.telegram.org/bot{bot_token}/deleteMessage", data={'chat_id': user_id, 'message_id': os.environ['M_ID']})

          zenith_engine()
          EOF
