name: TBL Ultra Music Engine (Direct Delivery)
on:
  repository_dispatch:
    types: [process_music]

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🛠 Setup Environment (FFmpeg)
        uses: federicocarboni/setup-ffmpeg@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Install yt-dlp & Requests
        run: python3 -m pip install -U yt-dlp requests

      - name: 📥 Advanced Extraction
        id: dl
        env:
          QUERY: "${{ github.event.client_payload.query }}"
        run: |
          CLEAN_QUERY=$(echo "$QUERY" | sed 's/[^a-zA-Z0-9 ]/ /g' | xargs)
          
          yt-dlp "ytsearch1:$CLEAN_QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --force-ipv4 --extractor-args "youtube:player_client=android_vr,ios" \
            --no-playlist --no-check-certificates --no-warnings \
            -o "track.mp3" --write-info-json || \
          yt-dlp "scsearch1:$QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --no-playlist -o "track.mp3" --write-info-json

          if [ ! -f "track.mp3" ]; then echo "All sources failed" && exit 1; fi

      - name: ☁️ Direct Delivery to User (Bypassing Cloudflare)
        id: tg_pro
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          DUMP_CHAT_ID: ${{ secrets.TG_DUMP_CHAT_ID }}
          USER_CHAT_ID: "${{ github.event.client_payload.chat_id }}"
          MSG_ID: "${{ github.event.client_payload.msg_id }}"
        run: |
          python3 - <<EOF
          import os, requests, json, sys

          # 1. GET METADATA
          json_files = [f for f in os.listdir('.') if f.endswith('.info.json')]
          with open(json_files[0], 'r') as f:
              data = json.load(f)

          title = data.get('title', 'Unknown Title')[:100]
          performer = (data.get('uploader') or data.get('artist') or 'Music Bot')[:50]
          duration = data.get('duration_string', '0:00')

          bot_token = os.environ['BOT_TOKEN']
          user_id = os.environ['USER_CHAT_ID']
          dump_id = os.environ['DUMP_CHAT_ID']
          msg_id = os.environ['MSG_ID']

          # 2. UPLOAD DIRECTLY TO THE USER
          print(f"Delivering song to User: {user_id}...")
          files = {'audio': open('track.mp3', 'rb')}
          payload = {
              'chat_id': user_id, 
              'title': title, 
              'performer': 'Ultra Music Engine',
              'caption': f"✅ *Track Found!*\n🎵 *{title}*\n⏱ {duration}",
              'parse_mode': 'Markdown'
          }
          
          url_send = f"https://api.telegram.org/bot{bot_token}/sendAudio"
          r_send = requests.post(url_send, data=payload, files=files)
          
          if r_send.json().get('ok'):
              print("✅ Song delivered to user successfully!")
              # ALSO upload to dump channel for your records
              requests.post(url_send, data={'chat_id': dump_id, 'title': title}, files={'audio': open('track.mp3', 'rb')})
          else:
              print(f"❌ Failed to send to user: {r_send.text}")
              sys.exit(1)

          # 3. DELETE THE "PROCESSING" MESSAGE IN THE BOT
          print(f"Cleaning up loading message {msg_id}...")
          url_del = f"https://api.telegram.org/bot{bot_token}/deleteMessage"
          requests.post(url_del, data={'chat_id': user_id, 'message_id': msg_id})
          
          EOF
