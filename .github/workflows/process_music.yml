name: TBL Ultra Music Engine
on:
  repository_dispatch:
    types: [process_music]

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🛠 Setup Pro Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl jq nodejs
          sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 📥 Multi-Source Downloader (YT-TV + YT-iOS + SC)
        id: dl
        run: |
          QUERY="${{ github.event.client_payload.query }}"
          echo "Processing: $QUERY"

          # ATTEMPT 1: YouTube TV Client (Best Bypass for "Sign in" error)
          echo "Trying YouTube TV..."
          yt-dlp "ytsearch1:$QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --force-ipv4 --extractor-args "youtube:player_client=tv,web" \
            --no-playlist -o "track.mp3" --write-info-json || echo "YT-TV Failed"

          # ATTEMPT 2: YouTube iOS Fallback
          if [ ! -f "track.mp3" ]; then
            echo "Trying YouTube iOS..."
            yt-dlp "ytsearch1:$QUERY" \
              --extract-audio --audio-format mp3 --audio-quality 0 \
              --force-ipv4 --extractor-args "youtube:player_client=ios" \
              --no-playlist -o "track.mp3" --write-info-json || echo "YT-iOS Failed"
          fi

          # ATTEMPT 3: SoundCloud Ultimate Fallback
          if [ ! -f "track.mp3" ]; then
            echo "Trying SoundCloud..."
            yt-dlp "scsearch1:$QUERY" \
              --extract-audio --audio-format mp3 --audio-quality 0 \
              --no-playlist -o "track.mp3" --write-info-json
          fi

          # Verify if file exists
          if [ ! -f "track.mp3" ]; then echo "All sources failed" && exit 1; fi

          # Extract Metadata carefully
          # We use a temp file to avoid "Exit Code 26" errors with special characters
          JSON_FILE=$(ls *.info.json | head -n 1)
          echo "VID_ID=$(jq -r '.id' $JSON_FILE)" >> $GITHUB_ENV
          echo "TITLE=$(jq -r '.title' $JSON_FILE | tr -d '\"' | cut -c1-100)" >> $GITHUB_ENV
          echo "ARTIST=$(jq -r '.uploader // .artist' $JSON_FILE | tr -d '\"' | cut -c1-50)" >> $GITHUB_ENV
          echo "DUR=$(jq -r '.duration_string' $JSON_FILE)" >> $GITHUB_ENV
          echo "THUMB=$(jq -r '.thumbnail' $JSON_FILE)" >> $GITHUB_ENV

      - name: ☁️ Upload to Telegram CDN
        run: |
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendAudio" \
            -F chat_id="${{ secrets.TG_DUMP_CHAT_ID }}" \
            -F audio=@"track.mp3" \
            -F title="${{ env.TITLE }}" \
            -F performer="${{ env.ARTIST }}")
          
          FILE_ID=$(echo $RESPONSE | jq -r '.result.audio.file_id')
          if [ "$FILE_ID" == "null" ]; then echo "TG Upload Failed" && exit 1; fi
          echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV

      - name: 📡 Success Callback (Cloudflare Breaker)
        if: success()
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -d "{
              \"status\": \"success\",
              \"chat_id\": \"${{ github.event.client_payload.chat_id }}\",
              \"video_id\": \"${{ env.VID_ID }}\",
              \"file_id\": \"${{ env.FILE_ID }}\",
              \"title\": \"${{ env.TITLE }}\",
              \"duration\": \"${{ env.DUR }}\",
              \"thumbnail\": \"${{ env.THUMB }}\"
            }"
