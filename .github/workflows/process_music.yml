name: TBL Ultra Music Engine
on:
  repository_dispatch:
    types: [process_music]

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🚀 Turbo Setup
        run: python3 -m pip install -U yt-dlp

      - name: 📥 Advanced Extraction (Search-to-Link Bypass)
        id: dl
        env:
          QUERY: "${{ github.event.client_payload.query }}"
        run: |
          # 1. High-Precision Search Logic
          # We try Android VR client first, then TV.
          echo "Searching for: $QUERY"

          yt-dlp "ytsearch1:$QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --force-ipv4 --extractor-args "youtube:player_client=android,ios" \
            --no-playlist --no-check-certificates --no-warnings \
            -o "track.mp3" --write-info-json || \
          yt-dlp "scsearch1:$QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            -o "track.mp3" --write-info-json

          # 2. Check if the download actually happened
          if [ ! -f "track.mp3" ]; then
             echo "❌ YouTube Search returned 0 items. Trying Direct Metadata Fetch..."
             # If search fails, we try to get a URL and download that URL specifically
             URL=$(yt-dlp --get-id "ytsearch1:$QUERY" || echo "")
             if [ ! -z "$URL" ]; then
                yt-dlp "https://www.youtube.com/watch?v=$URL" \
                --extract-audio --audio-format mp3 --audio-quality 0 \
                --force-ipv4 --extractor-args "youtube:player_client=android,ios" \
                -o "track.mp3" --write-info-json
             fi
          fi

          if [ ! -f "track.mp3" ]; then echo "All sources failed" && exit 1; fi

          # 3. Extract Metadata
          JSON_FILE=$(ls *.info.json | head -n 1)
          echo "VID_ID=$(jq -r '.id' $JSON_FILE)" >> $GITHUB_ENV
          echo "TITLE=$(jq -r '.title' $JSON_FILE | tr -d '\"' | head -c 100)" >> $GITHUB_ENV
          echo "ARTIST=$(jq -r '.uploader // .artist' $JSON_FILE | tr -d '\"' | head -c 50)" >> $GITHUB_ENV
          echo "DUR=$(jq -r '.duration_string' $JSON_FILE)" >> $GITHUB_ENV
          echo "THUMB=$(jq -r '.thumbnail' $JSON_FILE)" >> $GITHUB_ENV

      - name: ☁️ Fast Telegram Upload
        run: |
          RESPONSE=$(curl -s --http1.1 -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendAudio" \
            -F chat_id="${{ secrets.TG_DUMP_CHAT_ID }}" \
            -F audio=@"track.mp3" \
            -F title="${{ env.TITLE }}" \
            -F performer="${{ env.ARTIST }}")
          
          FILE_ID=$(echo $RESPONSE | jq -r '.result.audio.file_id')
          if [ "$FILE_ID" == "null" ] || [ -z "$FILE_ID" ]; then exit 1; fi
          echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV

      - name: 📡 Success Callback (Cloudflare Stealth)
        if: success()
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36" \
            -d "{
              \"status\": \"success\",
              \"chat_id\": \"${{ github.event.client_payload.chat_id }}\",
              \"mid\": \"${{ github.event.client_payload.msg_id }}\",
              \"video_id\": \"${{ env.VID_ID }}\",
              \"file_id\": \"${{ env.FILE_ID }}\",
              \"title\": \"${{ env.TITLE }}\",
              \"duration\": \"${{ env.DUR }}\",
              \"thumbnail\": \"${{ env.THUMB }}\"
            }"
