name: TBL Ultra Music Engine
on:
  repository_dispatch:
    types: [process_music]

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🚀 Turbo Setup
        run: python3 -m pip install -U yt-dlp

      - name: 📥 Advanced Extraction (Android-VR Bypass)
        id: dl
        run: |
          # 1. Clean the query (Removes symbols like & - | that break searches)
          RAW_QUERY="${{ github.event.client_payload.query }}"
          CLEAN_QUERY=$(echo "$RAW_QUERY" | sed 's/[^a-zA-Z0-9 ]/ /g' | xargs)
          echo "Cleaned Query: $CLEAN_QUERY"

          # 2. Triple-Client Download Strategy
          # - Try Android VR Client (Best Bypass)
          # - Try iOS Client
          # - Fallback to SoundCloud
          
          yt-dlp "ytsearch1:$CLEAN_QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --force-ipv4 --extractor-args "youtube:player_client=android_vr,ios" \
            --user-agent "Mozilla/5.0 (Android 14; Mobile; rv:124.0) Gecko/124.0 Firefox/124.0" \
            --no-playlist --no-check-certificates --no-warnings \
            -o "track.mp3" --write-info-json || \
          yt-dlp "ytsearch1:$RAW_QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --force-ipv4 --extractor-args "youtube:player_client=tv,web" \
            -o "track.mp3" --write-info-json || \
          yt-dlp "scsearch1:$CLEAN_QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            -o "track.mp3" --write-info-json

          if [ ! -f "track.mp3" ]; then echo "All sources failed" && exit 1; fi

          # 3. Clean Metadata Extraction (Prevents JSON crashes)
          JSON_FILE=$(ls *.info.json | head -n 1)
          TITLE=$(jq -r '.title' $JSON_FILE | tr -d '\"' | head -c 100)
          ARTIST=$(jq -r '.uploader // .artist' $JSON_FILE | tr -d '\"' | head -c 50)
          
          echo "VID_ID=$(jq -r '.id' $JSON_FILE)" >> $GITHUB_ENV
          echo "TITLE=$TITLE" >> $GITHUB_ENV
          echo "ARTIST=$ARTIST" >> $GITHUB_ENV
          echo "DUR=$(jq -r '.duration_string' $JSON_FILE)" >> $GITHUB_ENV
          echo "THUMB=$(jq -r '.thumbnail' $JSON_FILE)" >> $GITHUB_ENV

      - name: ☁️ Fast Telegram Upload
        run: |
          RESPONSE=$(curl -s --http1.1 -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendAudio" \
            -F chat_id="${{ secrets.TG_DUMP_CHAT_ID }}" \
            -F audio=@"track.mp3" \
            -F title="${{ env.TITLE }}" \
            -F performer="${{ env.ARTIST }}")
          
          FILE_ID=$(echo $RESPONSE | jq -r '.result.audio.file_id')
          if [ "$FILE_ID" == "null" ] || [ -z "$FILE_ID" ]; then exit 1; fi
          echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV

      - name: 📡 Success Callback (Cloudflare Stealth)
        if: success()
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36" \
            -d "{
              \"status\": \"success\",
              \"chat_id\": \"${{ github.event.client_payload.chat_id }}\",
              \"mid\": \"${{ github.event.client_payload.msg_id }}\",
              \"video_id\": \"${{ env.VID_ID }}\",
              \"file_id\": \"${{ env.FILE_ID }}\",
              \"title\": \"${{ env.TITLE }}\",
              \"duration\": \"${{ env.DUR }}\",
              \"thumbnail\": \"${{ env.THUMB }}\"
            }"
