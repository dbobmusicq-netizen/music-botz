name: TBL Hybrid Siege Engine (v11.0 - Ultra Stable)
on:
  repository_dispatch:
    types: [process_music]

jobs:
  hybrid-delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Maximum time allowed for difficult extractions

    steps:
      - name: 🛠 Setup FFmpeg
        uses: federicocarboni/setup-ffmpeg@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Install Dependencies
        run: |
          python3 -m pip install -U yt-dlp requests
          echo "/usr/bin" >> $GITHUB_PATH

      - name: 📥 Ironclad Siege Extraction
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          DUMP_ID: ${{ secrets.TG_DUMP_CHAT_ID }}
          U_ID: "${{ github.event.client_payload.chat_id }}"
          M_ID: "${{ github.event.client_payload.msg_id }}"
          T_ID: "${{ github.event.client_payload.track_id }}"
          QUERY: "${{ github.event.client_payload.query }}"
          WEB_URL: "https://prod-api.telebothost.com/ownlang/webapp/15614049/save_cache"
        run: |
          python3 - <<EOF
          import os, requests, subprocess, json, sys, time

          def siege_engine():
              query = os.environ['QUERY']
              bot_token = os.environ['BOT_TOKEN']
              user_id = os.environ['U_ID']
              dump_id = os.environ['DUMP_ID']
              track_id = os.environ.get('T_ID', '0')
              
              success = False
              final_title = query
              
              # Realistic Browser Headers for JioSaavn
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36",
                  "Accept": "application/json",
                  "Referer": "https://www.jiosaavn.com/"
              }

              # --- STEP 1: JIOSAAVN MULTI-API ATTACK ---
              saavn_apis = [
                  f"https://saavn.me/search/songs?query={query}&limit=1",
                  f"https://jiosaavn-api-beta.vercel.app/search/songs?query={query}&limit=1"
              ]
              
              for api in saavn_apis:
                  if success: break
                  try:
                      print(f"Trying Saavn API: {api}")
                      r = requests.get(api, headers=headers, timeout=15)
                      data = r.json()
                      if data.get('status') == 'SUCCESS' and data['data']['results']:
                          res = data['data']['results'][0]
                          final_title = f"{res['name']} - {res['primaryArtists']}"
                          audio_url = res['downloadUrl'][4]['link']
                          
                          with requests.get(audio_url, stream=True, timeout=20) as r_file:
                              with open('track.mp3', 'wb') as f:
                                  for chunk in r_file.iter_content(chunk_size=16384):
                                      f.write(chunk)
                          if os.path.exists('track.mp3') and os.path.getsize('track.mp3') > 1000:
                              success = True
                              print("✅ Saavn Success!")
                  except Exception as e:
                      print(f"Saavn API failed: {e}")

              # --- STEP 2: YOUTUBE CLIENT ROTATION SIEGE ---
              # We try different clients sequentially if 'Sign in' error appears
              if not success:
                  # Removed characters that break YT Search
                  clean_q = "".join(e for e in query if e.isalnum() or e.isspace())
                  clients = ['android_vr', 'ios', 'tv', 'web_embedded', 'mweb']
                  
                  for client in clients:
                      if success: break
                      print(f"Trying YouTube with client: {client}")
                      ydl_opts = {
                          'format': 'bestaudio/best',
                          'outtmpl': 'track.%(ext)s',
                          'postprocessors': [{'key': 'FFmpegExtractAudio','preferredcodec': 'mp3','preferredquality': '192'}],
                          'quiet': True,
                          'no_warnings': True,
                          'force_ipv4': True,
                          'extractor_args': {'youtube': {'player_client': [client]}}
                      }
                      try:
                          import yt_dlp
                          with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                              info = ydl.extract_info(f"ytsearch1:{clean_q}", download=True)
                              final_title = info['entries'][0]['title']
                              if os.path.exists('track.mp3'):
                                  success = True
                                  print(f"✅ YouTube Success with {client}!")
                      except Exception as e:
                          print(f"YouTube {client} failed: {e}")
                          if os.path.exists('track.mp3'): os.remove('track.mp3')

              # --- STEP 3: SOUNDCLOUD FINAL STAND ---
              if not success:
                  print("Trying SoundCloud Fallback...")
                  try:
                      subprocess.run(['yt-dlp', f"scsearch1:{query}", '--extract-audio', '--audio-format', 'mp3', '-o', 'track.mp3', '--quiet'], check=True)
                      if os.path.exists('track.mp3'): 
                          success = True
                          print("✅ SoundCloud Success!")
                  except: pass

              # --- DELIVERY & CACHE ---
              if success and os.path.exists('track.mp3'):
                  tg_url = f"https://api.telegram.org/bot{bot_token}/sendAudio"
                  lyric_kb = json.dumps({"inline_keyboard": [[{"text": "📝 View Lyrics", "callback_data": f"lyr_{track_id}"}]]})

                  with open('track.mp3', 'rb') as audio_file:
                      # Upload to storage channel
                      r_dump = requests.post(tg_url, data={'chat_id': dump_id, 'title': final_title}, files={'audio': audio_file})
                  
                  if r_dump.json().get('ok'):
                      fid = r_dump.json()['result']['audio']['file_id']
                      # Deliver to user
                      requests.post(tg_url, data={'chat_id': user_id, 'audio': fid, 'caption': f"✅ *Stability Guarantee (v11)*\n🎵 {final_title}", 'parse_mode': 'Markdown', 'reply_markup': lyric_kb})
                      
                      # Sync Cache
                      if track_id != "undefined" and track_id != "0":
                          requests.get(os.environ['WEB_URL'], params={'id': track_id, 'file': fid}, headers={"User-Agent":"Mozilla/5.0"})
              else:
                  requests.post(f"https://api.telegram.org/bot{bot_token}/sendMessage", data={'chat_id': user_id, 'text': "❌ *Critcal Error:* Song is globally blocked or unavailable."})

              # Cleanup UI
              requests.post(f"https://api.telegram.org/bot{bot_token}/deleteMessage", data={'chat_id': user_id, 'message_id': os.environ['M_ID']})

          siege_engine()
          EOF
