name: TBL Music Engine (Stable Edition)
on:
  repository_dispatch:
    types: [process_music]

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🚀 Turbo Setup
        run: |
          # Fast binary download
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          chmod a+rx /usr/local/bin/yt-dlp

      - name: 📥 Stable Extraction
        id: dl
        env:
          QUERY: "${{ github.event.client_payload.query }}"
        run: |
          # Clean Query
          CLEAN_QUERY=$(echo "$QUERY" | sed 's/[^a-zA-Z0-9 ]/ /g' | xargs)
          
          # Try YouTube (TV Client) then SoundCloud
          yt-dlp "ytsearch1:$CLEAN_QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --force-ipv4 --extractor-args "youtube:player_client=tv,ios" \
            --no-playlist --no-check-certificates --quiet \
            -o "track.mp3" --write-info-json || \
          yt-dlp "scsearch1:$QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --no-playlist -o "track.mp3" --write-info-json

          if [ ! -f "track.mp3" ]; then exit 1; fi

      - name: ☁️ Direct Delivery & Cache Update
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          DUMP_ID: ${{ secrets.TG_DUMP_CHAT_ID }}
          U_ID: "${{ github.event.client_payload.chat_id }}"
          M_ID: "${{ github.event.client_payload.msg_id }}"
          T_ID: "${{ github.event.client_payload.track_id }}"
          # 👇 REPLACE 15614049 WITH YOUR BOT ID
          WEB_URL: "https://prod-api.telebothost.com/ownlang/webapp/15614049/save_cache"
        run: |
          python3 - <<EOF
          import os, requests, json, sys

          # 1. Get Metadata
          info = [f for f in os.listdir('.') if f.endswith('.info.json')][0]
          with open(info, 'r') as f:
              meta = json.load(f)
          title = meta.get('title', 'Audio')[:100]

          bot_token = os.environ['BOT_TOKEN']
          url = f"https://api.telegram.org/bot{bot_token}/sendAudio"

          # 2. Upload to Dump Channel to get File ID
          files = {'audio': open('track.mp3', 'rb')}
          r_dump = requests.post(url, data={'chat_id': os.environ['DUMP_ID'], 'title': title}, files=files)
          
          if r_dump.json().get('ok'):
              fid = r_dump.json()['result']['audio']['file_id']
              
              # 3. Direct Delivery to User (Bypass Cloudflare)
              requests.post(url, data={'chat_id': os.environ['U_ID'], 'audio': fid, 'caption': f"✅ *Success!*\n🎵 {title}", 'parse_mode': 'Markdown'})

              # 4. Update Bot Cache (GET bypasses 403)
              requests.get(os.environ['WEB_URL'], params={'id': os.environ['T_ID'], 'file': fid}, headers={"User-Agent":"Mozilla/5.0"})
          
          # 5. Cleanup
          requests.post(f"https://api.telegram.org/bot{bot_token}/deleteMessage", data={'chat_id': os.environ['U_ID'], 'message_id': os.environ['M_ID']})
          EOF
