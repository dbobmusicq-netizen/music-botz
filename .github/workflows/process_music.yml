name: TBL Hybrid Turbo Engine (v8.0)
on:
  repository_dispatch:
    types: [process_music]

jobs:
  hybrid-delivery:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🚀 Turbo Setup
        run: |
          # Grab latest yt-dlp binary (Fastest method)
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          chmod a+rx /usr/local/bin/yt-dlp
          python3 -m pip install -U requests

      - name: 📥 Waterfall Extraction & Direct Delivery
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          DUMP_ID: ${{ secrets.TG_DUMP_CHAT_ID }}
          U_ID: "${{ github.event.client_payload.chat_id }}"
          M_ID: "${{ github.event.client_payload.msg_id }}"
          T_ID: "${{ github.event.client_payload.track_id }}"
          QUERY: "${{ github.event.client_payload.query }}"
          # 👇 REPLACE 15614049 WITH YOUR NUMERIC BOT ID
          WEB_URL: "https://prod-api.telebothost.com/ownlang/webapp/15614049/save_cache"
        run: |
          python3 - <<EOF
          import os, requests, subprocess, json, sys

          def turbo_engine():
              query = os.environ['QUERY']
              bot_token = os.environ['BOT_TOKEN']
              user_id = os.environ['U_ID']
              dump_id = os.environ['DUMP_ID']
              
              stream_url = None
              title = "Audio"

              # --- LAYER 1: JIOSAAVN (Lightning Fast / Direct MP4 Link) ---
              try:
                  print(f"Searching JioSaavn: {query}")
                  # Use a high-reputation public Saavn API
                  api = f"https://saavn.me/search/songs?query={query}&limit=1"
                  r = requests.get(api, timeout=4).json()
                  if r['status'] == 'SUCCESS' and r['data']['results']:
                      res = r['data']['results'][0]
                      title = f"{res['name']} - {res['primaryArtists']}"
                      # Get the 320kbps direct link
                      stream_url = res['downloadUrl'][4]['link']
                      print("✅ Found on JioSaavn!")
              except: pass

              # --- LAYER 2: YOUTUBE MUSIC (Fallback / Android-VR Bypass) ---
              if not stream_url:
                  print("JioSaavn missed. Trying YouTube Music...")
                  try:
                      # Using Android-VR client as it bypasses 'Sign-in' blocks on GH IPs
                      cmd = ['yt-dlp', f"ytsearch1:{query}", '--get-url', '--get-title', '--force-ipv4', '--extractor-args', 'youtube:player_client=android_vr,ios']
                      process = subprocess.run(cmd, capture_output=True, text=True)
                      out = process.stdout.split('\n')
                      if len(out) >= 2:
                          title = out[0]
                          stream_url = out[1]
                          print("✅ Found on YouTube Music!")
                  except: pass

              # --- LAYER 3: SOUNDCLOUD (Final Bulletproof Fallback) ---
              if not stream_url:
                  print("YTM missed. Trying SoundCloud...")
                  try:
                      cmd = ['yt-dlp', f"scsearch1:{query}", '--get-url', '--get-title']
                      process = subprocess.run(cmd, capture_output=True, text=True)
                      out = process.stdout.split('\n')
                      if len(out) >= 2:
                          title = out[0]
                          stream_url = out[1]
                          print("✅ Found on SoundCloud!")
                  except: pass

              if not stream_url:
                  requests.post(f"https://api.telegram.org/bot{bot_token}/sendMessage", data={'chat_id': user_id, 'text': "❌ Track not found on any server."})
                  sys.exit(1)

              # --- TURBO PROCESSING (Direct-to-MP3 Stream) ---
              # We don't download the source file. We stream the URL directly into an MP3 file.
              output_file = "track.mp3"
              print(f"Streaming and Converting: {title}")
              
              # -i (input URL), -c:a (codec), -q:a (quality level 2 = ~192-256kbps VBR)
              subprocess.run(['ffmpeg', '-y', '-i', stream_url, '-vn', '-c:a', 'libmp3lame', '-q:a', '2', output_file], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)

              # --- DELIVERY & SMART CACHE SYNC ---
              tg_url = f"https://api.telegram.org/bot{bot_token}/sendAudio"
              with open(output_file, 'rb') as f:
                  # 1. Upload to Dump Channel to generate permanent file_id
                  r_dump = requests.post(tg_url, data={'chat_id': dump_id, 'title': title}, files={'audio': f})
              
              if r_dump.json().get('ok'):
                  fid = r_dump.json()['result']['audio']['file_id']
                  
                  # 2. Direct Delivery to user (Bypass TBL Cloudflare)
                  requests.post(tg_url, data={'chat_id': user_id, 'audio': fid, 'caption': f"✅ *Successfully Found!*\n🎵 {title}\n⚡ _High-Speed Hybrid Engine_", 'parse_mode': 'Markdown'})
                  
                  # 3. Sync to Bot Database (GET method is Cloudflare-Proof)
                  tid = os.environ.get('T_ID')
                  if tid and tid != "undefined":
                      requests.get(os.environ['WEB_URL'], params={'id': tid, 'file': fid}, headers={"User-Agent":"Mozilla/5.0"})

              # 4. Cleanup UI
              requests.post(f"https://api.telegram.org/bot{bot_token}/deleteMessage", data={'chat_id': user_id, 'message_id': os.environ['M_ID']})

          turbo_engine()
          EOF
