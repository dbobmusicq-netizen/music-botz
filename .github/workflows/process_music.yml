name: TBL Turbo Music Engine
on:
  repository_dispatch:
    types: [process_music]

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ŌÜĪ Instant Setup
        run: |
          # FFmpeg, Curl, JQ, and Node.js are already pre-installed on GitHub Runners.
          # We only install yt-dlp via pip (much faster than wget/apt).
          python3 -m pip install -U yt-dlp

      - name: ­¤ōź Smart Multi-Source Extraction
        id: dl
        run: |
          QUERY="${{ github.event.client_payload.query }}"
          echo "Processing: $QUERY"

          # Optimized yt-dlp command: 
          # 1. Combined Clients (TV + iOS) in one go to save time.
          # 2. --no-check-certificates and --no-warnings for speed.
          # 3. Automatic fallback to SoundCloud integrated in one line.
          
          yt-dlp "ytsearch1:$QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --force-ipv4 --extractor-args "youtube:player_client=tv,ios" \
            --no-playlist --no-check-certificates --no-warnings \
            -o "track.mp3" --write-info-json || \
          yt-dlp "scsearch1:$QUERY" \
            --extract-audio --audio-format mp3 --audio-quality 0 \
            --no-playlist -o "track.mp3" --write-info-json

          if [ ! -f "track.mp3" ]; then echo "All sources failed" && exit 1; fi

          # Advanced Metadata Sanitization (Prevents JSON errors in TBL)
          JSON_FILE=$(ls *.info.json | head -n 1)
          TITLE=$(jq -r '.title' $JSON_FILE | tr -d '\"' | head -c 100)
          ARTIST=$(jq -r '.uploader // .artist' $JSON_FILE | tr -d '\"' | head -c 50)
          
          echo "VID_ID=$(jq -r '.id' $JSON_FILE)" >> $GITHUB_ENV
          echo "TITLE=$TITLE" >> $GITHUB_ENV
          echo "ARTIST=$ARTIST" >> $GITHUB_ENV
          echo "DUR=$(jq -r '.duration_string' $JSON_FILE)" >> $GITHUB_ENV
          echo "THUMB=$(jq -r '.thumbnail' $JSON_FILE)" >> $GITHUB_ENV

      - name: Ōśü’ĖÅ High-Speed Telegram Upload
        run: |
          # Use --http1.1 for faster, more stable Telegram API uploads
          RESPONSE=$(curl -s --http1.1 -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendAudio" \
            -F chat_id="${{ secrets.TG_DUMP_CHAT_ID }}" \
            -F audio=@"track.mp3" \
            -F title="${{ env.TITLE }}" \
            -F performer="${{ env.ARTIST }}")
          
          FILE_ID=$(echo $RESPONSE | jq -r '.result.audio.file_id')
          if [ "$FILE_ID" == "null" ]; then exit 1; fi
          echo "FILE_ID=$FILE_ID" >> $GITHUB_ENV

      - name: ­¤ōĪ Pro-Callback (Cloudflare Stealth)
        if: success()
        run: |
          # Enhanced headers to guarantee 100% bypass of TeleBotHost firewalls
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -H "Referer: https://www.google.com/" \
            -d "{
              \"status\": \"success\",
              \"chat_id\": \"${{ github.event.client_payload.chat_id }}\",
              \"mid\": \"${{ github.event.client_payload.msg_id }}\",
              \"video_id\": \"${{ env.VID_ID }}\",
              \"file_id\": \"${{ env.FILE_ID }}\",
              \"title\": \"${{ env.TITLE }}\",
              \"duration\": \"${{ env.DUR }}\",
              \"thumbnail\": \"${{ env.THUMB }}\"
            }"
