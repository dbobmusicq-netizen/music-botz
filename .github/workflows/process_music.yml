name: TBL Turbo Music Engine
on:
  repository_dispatch:
    types: [process_music]

jobs:
  turbo-process:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⚡ High-Speed Execution
        env:
          BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          U_ID: "${{ github.event.client_payload.chat_id }}"
          M_ID: "${{ github.event.client_payload.msg_id }}"
          T_ID: "${{ github.event.client_payload.track_id }}"
          QUERY: "${{ github.event.client_payload.query }}"
          # 👇 REPLACE 15614049 WITH YOUR NUMERIC BOT ID FROM TBL
          WEBAPP_URL: "https://prod-api.telebothost.com/ownlang/webapp/15614049/save_cache"
        run: |
          # 1. Binary Injection (Faster than pip)
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          chmod a+rx /usr/local/bin/yt-dlp

          python3 - <<EOF
          import os, requests, subprocess, json

          def run():
              q = os.environ['QUERY']
              clean_q = "".join(e for e in q if e.isalnum() or e.isspace())
              
              # 2. Multi-Client Extraction (Android-VR + TV + iOS)
              cmd = [
                  'yt-dlp', f"ytsearch1:{clean_q}",
                  '--extract-audio', '--audio-format', 'mp3', '--audio-quality', '0',
                  '--force-ipv4', '--extractor-args', 'youtube:player_client=android,tv,ios',
                  '-o', 't.mp3', '--no-playlist', '--quiet', '--write-info-json'
              ]
              
              try:
                  subprocess.run(cmd, check=True)
              except:
                  # SoundCloud Fallback
                  subprocess.run(['yt-dlp', f"scsearch1:{q}", '--extract-audio', '--audio-format', 'mp3', '-o', 't.mp3', '--quiet', '--write-info-json'])

              if not os.path.exists('t.mp3'): return

              # 3. Metadata Parsing
              info_file = next(f for f in os.listdir('.') if f.endswith('.info.json'))
              with open(info_file, 'r') as f:
                  meta = json.load(f)
              title = meta.get('title', 'Audio')[:100]

              # 4. Direct Telegram Delivery
              url = f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendAudio"
              files = {'audio': open('t.mp3', 'rb')}
              r = requests.post(url, data={
                  'chat_id': os.environ['U_ID'], 
                  'title': title, 
                  'caption': f"✅ *Uploaded Successfully*\n🎵 {title}", 
                  'parse_mode': 'Markdown'
              }, files=files)

              # 5. Background Cache Sync (Webapp GET avoids Cloudflare block)
              if r.json().get('ok'):
                  fid = r.json()['result']['audio']['file_id']
                  requests.get(os.environ['WEBAPP_URL'], params={'id': os.environ['T_ID'], 'file': fid}, headers={"User-Agent":"Mozilla/5.0"})

              # 6. Cleanup Loading Message
              requests.post(f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/deleteMessage", 
                            data={'chat_id': os.environ['U_ID'], 'message_id': os.environ['M_ID']})

          run()
          EOF
