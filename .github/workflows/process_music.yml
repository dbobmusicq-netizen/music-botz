- name: 📡 Success Callback to TBL Bot (Bypassing Cloudflare)
        if: success()
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Sec-Ch-Ua: \"Google Chrome\";v=\"123\", \"Not:A-Brand\";v=\"8\", \"Chromium\";v=\"123\"" \
            -H "Sec-Ch-Ua-Mobile: ?0" \
            -H "Sec-Ch-Ua-Platform: \"Windows\"" \
            -H "Sec-Fetch-Dest: empty" \
            -H "Sec-Fetch-Mode: cors" \
            -H "Sec-Fetch-Site: cross-site" \
            -d "{
              \"status\": \"success\",
              \"chat_id\": \"${{ github.event.client_payload.chat_id }}\",
              \"user_id\": \"${{ github.event.client_payload.user_id }}\",
              \"user_name\": \"${{ github.event.client_payload.user_name }}\",
              \"video_id\": \"${{ env.VID_ID }}\",
              \"file_id\": \"${{ env.FILE_ID }}\",
              \"title\": \"${{ env.TITLE }}\",
              \"duration\": \"${{ env.DURATION }}\",
              \"thumbnail\": \"${{ env.THUMB }}\"
            }"

      - name: ❌ Failure Callback to TBL Bot (Bypassing Cloudflare)
        if: failure()
        run: |
          curl -s -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36" \
            -H "Accept: application/json" \
            -d "{
              \"status\": \"error\",
              \"chat_id\": \"${{ github.event.client_payload.chat_id }}\",
              \"error_message\": \"Track unavailable or exceeds 15 minutes.\"
            }"
